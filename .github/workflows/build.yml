name: Gorizyon Builder Engine v8

on:
  repository_dispatch:
    types: [aswv_build]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Patch swv.properties
        shell: python
        run: |
          import os
          import json
          import re

          payload = """${{ toJson(github.event.client_payload) }}"""
          data = json.loads(payload)
          
          # PROPERTIES DOSYASINI BUL
          target = "swv.properties"
          found_path = None
          for root, dirs, files in os.walk("."):
              if target in files:
                  found_path = os.path.join(root, target)
                  break
          
          if not found_path:
              print("HATA: swv.properties bulunamadı!")
              exit(1)

          print(f"Hedef dosya: {found_path}")

          with open(found_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          new_lines = []
          for line in lines:
              # 1. URL Güncelleme (app.url=...)
              if line.startswith("app.url="):
                  line = f"app.url={data['app_url']}\n"
              
              # 2. Özellikleri Güncelle (feature.xxx=...)
              # Panelden gelen config anahtarlarını (örn: feature.uploads) kontrol eder
              if "config" in data:
                  for key, value in data["config"].items():
                      # Panelden 'feature.uploads' gelirse, dosyada o satırı bulup değiştirir
                      if line.startswith(f"{key}="):
                          val_str = "true" if value else "false"
                          line = f"{key}={val_str}\n"
              
              new_lines.append(line)

          with open(found_path, 'w', encoding='utf-8') as f:
              f.writelines(new_lines)
          
          print("Gorizyon v8 Konfigürasyonu Başarıyla Güncellendi.")

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK to Server
        run: |
          curl -X POST \
          -F "file=@app/build/outputs/apk/release/app-release.apk" \
          -F "build_id=${{ github.event.client_payload.app_id }}" \
          "https://gorizyon.com.tr/builder/callback.php?token=${{ secrets.CALLBACK_TOKEN }}"
